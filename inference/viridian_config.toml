# From https://zenodo.org/records/16314739/files/viridian_mafft_2024-10-14_v1.vcz.zip
dataset="../data/viridian_mafft_2024-10-14_v1.vcz.zip"

run_id="v2"
results_dir = "results"
log_dir = "logs"
matches_dir= "/tmp/jk/matches"
log_level = 2

exclude_dates = ["2020-12-31"]

exclude_sites = [
    106, 8835, 11074, 11083, 15521, 16887, 21575, 21987, 27577, 28245, 28253, 28313, 29733,
]

date_field="Date_tree"

[extend_parameters]
num_mismatches=4
hmm_cost_threshold=7
max_missing_sites=500
deletions_as_missing=true
# max_daily_samples=1000

# Knobs for tuning retro group insertion
min_group_size=10
min_root_mutations=2
max_recurrent_mutations=2
max_mutations_per_sample=5
retrospective_window=7

num_threads=80
memory_limit=250

include_samples=[
    # B.1.617.1 https://github.com/jeromekelleher/sc2ts-paper/issues/1006
    "ERR5461562", #2021-02-22
    "ERR5469699", #2021-03-02

    # B.1.617.2 https://github.com/jeromekelleher/sc2ts-paper/issues/1006
    "ERR5676810", # 2021-03-23

    # BA.1 https://github.com/jeromekelleher/sc2ts-paper/issues/264
    "SRR17041376", # 2021-11-12  South Africa   Gauteng

    # BA.2 https://github.com/jeromekelleher/sc2ts-paper/issues/265
    "SRR17461792", # 2021-11-27, South Africa   Gauteng

    # BA.3 https://github.com/jeromekelleher/sc2ts-paper/issues/1002
    "SRR17258788", # 2021-11-30, South Africa   Kwazulu-Natal

    # BA.5 https://github.com/jeromekelleher/sc2ts-paper/issues/1003
    "SRR23625005", # 2022-02-06, South Africa

    # XB parents https://github.com/jeromekelleher/sc2ts-paper/issues/1013
    # B.1.634
    "SRR14037887", # 2021-03-03, USA   Texus
    # B.1.631
    "SRR16176783", # 2020-12-16, USA   California
]


[[override]]
start = "2020-01-01"
stop = "2020-03-01"
parameters.max_missing_sites = 10000
